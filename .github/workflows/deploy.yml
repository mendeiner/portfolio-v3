name: Build and Deploy to KingHost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to KingHost via FTP
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u brunoedita,"$FTP_PASSWORD" ftp.brunoedita.com.br << 'EOF'
          set ssl:verify-certificate no
          set ftp:passive-mode on
          mirror --reverse --parallel=4 --verbose dist .
          bye
          EOF
